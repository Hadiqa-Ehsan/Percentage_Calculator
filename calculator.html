<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>

    <style>
        /* Basic styling */
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        .box {
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 2px  solid black;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h2>Simple Calculator</h2>

    <div class="box">
        <!-- Input fields -->
        <input type="number" id="num1" placeholder="Enter first number">
        <input type="number" id="num2" placeholder="Enter second number">
        <input type="number" id="num3" placeholder="Enter Third number">
        <input type="number" id="num4" placeholder="Enter Fourth number">
        <input type="number" id="num5" placeholder="Enter Fifth number">



        <!-- Operation buttons -->
        <button onclick="add()">+</button>
        <button onclick="calpercent">Percent</button>
        

        <!-- Result -->
        <p id="result"></p>
        <p id="Totalmarks"></p>
        <p id="percent"></p>
    </div>

<script>
    // Function to read inputs safely
    function getValues() {
        let a = document.getElementById("num1").value;
        let b = document.getElementById("num2").value;
        let c = document.getElementById("num3").value;
        let d = document.getElementById("num4").value;
        let e = document.getElementById("num5").value;

        // Check empty fields
        if (a === "" || b === "" || c== "" || d== "" || e== "") {
            document.getElementById("result").innerText = "Please enter All numbers!";
            return null;
        }

        return [parseFloat(a), parseFloat(b),parseFloat(c), parseFloat(d),parseFloat(e)];
    }

    // Addition
    function add() {
        let values = getValues();
        if (!values) return;
        let [a, b,c,d,e] = values;
        document.getElementById("Totalmarks").innerText = "Totalmarks: " + (a + b+ c + d + e);
    }

    // Percentage
    function calpercent() {
        let values = getValues();
        if (!values) return;
        let [a, b,c,d,e] = values;
        document.getElementById("percent").innerText = "percent: " + ((add()*100)/500);
    }


   

    
</script>

</body>
</html>
